<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SnapName</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080808;
  --surface:#141414;
  --surface2:#1e1e1e;
  --surface3:#282828;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:#eeeade;
  --muted:#7a7870;
  --accent:#5DCAA5;
  --accent-d:rgba(93,202,165,0.14);
  --accent-b:rgba(93,202,165,0.38);
  --amber:#EF9F27;
  --amber-d:rgba(239,159,39,0.12);
  --amber-b:rgba(239,159,39,0.38);
  --red:#F09595;
  --red-d:rgba(240,149,149,0.12);
  --red-b:rgba(240,149,149,0.35);
  --r:10px;--rs:6px;
}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;
  display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;position:relative;
}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;flex-shrink:0;
  border-bottom:0.5px solid var(--border);
  background:var(--bg);z-index:10;
}
.logo{font-size:17px;font-weight:700;letter-spacing:-0.5px;}
.logo span{color:var(--accent);}
.hdr-right{display:flex;align-items:center;gap:10px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s;}
.status-dot.live{background:var(--accent);box-shadow:0 0 5px var(--accent);}
.icon-btn{
  background:var(--surface);border:0.5px solid var(--border2);
  border-radius:var(--rs);color:var(--muted);width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:18px;transition:all .15s;flex-shrink:0;
}
.icon-btn:active{transform:scale(0.93);}
.icon-btn.active{color:var(--amber);border-color:var(--amber-b);background:var(--amber-d);}

/* ── VIEWFINDER ── */
.vf-wrap{
  position:relative;flex:1;overflow:hidden;
  background:#000;min-height:0;
}
#video{
  width:100%;height:100%;
  object-fit:cover;display:block;
}
#still-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:none;z-index:2;
}

/* crop overlay svg */
#crop-svg{
  position:absolute;inset:0;width:100%;height:100%;
  z-index:3;pointer-events:none;display:block;
}
#crop-svg.interactive{pointer-events:all;}

/* confirm/reject bar */
.cr-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:5;
  display:none;flex-direction:column;align-items:stretch;
  background:linear-gradient(0deg,rgba(0,0,0,0.82) 0%,transparent 100%);
  padding:14px 16px 20px;gap:10px;
}
.cr-bar.visible{display:flex;}
.cr-filename{
  background:rgba(0,0,0,0.5);border:0.5px solid rgba(255,255,255,0.15);
  border-radius:var(--rs);padding:8px 12px;color:var(--text);font-size:14px;
  font-family:'SF Mono','Menlo',monospace;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cr-btns{display:flex;gap:10px;}
.cr-reject{
  flex:1;background:rgba(240,149,149,0.15);border:0.5px solid var(--red-b);
  border-radius:var(--r);color:var(--red);font-size:15px;font-weight:600;
  padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;
}
.cr-reject:active{transform:scale(0.97);}
.cr-confirm{
  flex:2;background:var(--accent);border:none;
  border-radius:var(--r);color:#04342C;font-size:15px;font-weight:700;
  padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;
}
.cr-confirm:active{transform:scale(0.97);opacity:.9;}

/* capture btn */
.capture-wrap{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:4;display:flex;flex-direction:column;align-items:center;gap:12px;
}
.capture-wrap.hidden{display:none;}
.cap-btn{
  width:72px;height:72px;border-radius:50%;
  background:rgba(255,255,255,0.95);
  border:3px solid rgba(255,255,255,0.3);
  box-shadow:0 0 0 5px rgba(255,255,255,0.1);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .1s,opacity .2s;
}
.cap-btn:active{transform:scale(0.91);}
.cap-btn.disabled{opacity:.3;pointer-events:none;}
.cap-inner{width:54px;height:54px;border-radius:50%;background:#fff;border:2.5px solid rgba(0,0,0,0.08);}

/* qr scan overlay */
.qr-overlay{
  position:absolute;inset:0;z-index:6;
  background:rgba(0,0,0,0.6);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.qr-overlay.visible{display:flex;}
.qr-frame{
  width:210px;height:210px;border:2px solid var(--accent);border-radius:14px;
  position:relative;overflow:hidden;
}
.qr-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  animation:scan 2s ease-in-out infinite;
}
@keyframes scan{0%{top:8%}50%{top:88%}100%{top:8%}}
.qr-hint{font-size:13px;color:rgba(255,255,255,0.65);letter-spacing:.4px;}
.qr-cancel{
  background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.2);
  color:#fff;padding:8px 22px;border-radius:20px;font-size:13px;cursor:pointer;
}

.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:8;transition:opacity .07s;}
.flash.go{opacity:1;}

/* ── BOTTOM PANEL ── */
.bottom{
  flex-shrink:0;background:var(--bg);
  border-top:0.5px solid var(--border);
  padding:14px 16px 20px;display:flex;flex-direction:column;gap:12px;
}
.row{display:flex;gap:8px;align-items:stretch;}
.lbl{font-size:10px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.name-inp{
  flex:1;background:var(--surface);border:0.5px solid var(--border2);
  border-radius:var(--rs);color:var(--text);font-size:15px;
  padding:9px 12px;outline:none;min-width:0;
  transition:border-color .2s;
}
.name-inp::placeholder{color:var(--muted);}
.name-inp:focus{border-color:var(--accent-b);}
.name-inp.filled{border-color:rgba(93,202,165,0.28);}
.qr-btn{
  background:var(--surface);border:0.5px solid var(--border2);
  border-radius:var(--rs);color:var(--muted);width:40px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .15s;
}
.qr-btn:active{transform:scale(0.94);}
.qr-btn.on{border-color:var(--accent-b);color:var(--accent);background:var(--accent-d);}

/* format chips */
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{
  padding:5px 13px;border-radius:16px;font-size:12px;font-weight:600;
  border:0.5px solid var(--border2);background:var(--surface);color:var(--muted);
  cursor:pointer;transition:all .15s;letter-spacing:.3px;
}
.chip.on{background:var(--accent-d);border-color:var(--accent-b);color:var(--accent);}
.chip.sm{padding:5px 10px;font-size:11px;}

/* ── SETTINGS SHEET ── */
.sheet-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0);z-index:20;
  pointer-events:none;transition:background .3s;
}
.sheet-backdrop.open{background:rgba(0,0,0,0.55);pointer-events:all;}
.sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--surface);border-radius:18px 18px 0 0;
  border-top:0.5px solid var(--border2);
  transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1,.4,1);
  max-height:88vh;overflow-y:auto;
  padding:0 0 32px;
}
.sheet.open{transform:translateY(0);}
.sheet-handle{
  width:36px;height:4px;background:var(--border2);
  border-radius:2px;margin:10px auto 0;
}
.sheet-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 10px;border-bottom:0.5px solid var(--border);
}
.sheet-title{font-size:15px;font-weight:600;letter-spacing:-.2px;}
.sheet-close{
  background:var(--surface2);border:none;color:var(--muted);
  width:28px;height:28px;border-radius:50%;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.sheet-section{padding:14px 18px 0;}
.sheet-section-lbl{
  font-size:10px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;
}

/* quality chips in sheet */
.q-chips{display:flex;gap:6px;}
.q-chip{
  flex:1;padding:8px 4px;border-radius:var(--rs);font-size:11px;font-weight:700;
  border:0.5px solid var(--border2);background:var(--surface2);color:var(--muted);
  cursor:pointer;text-align:center;transition:all .15s;letter-spacing:.3px;
}
.q-chip.on{background:var(--amber-d);border-color:var(--amber-b);color:var(--amber);}
.q-chip.disabled{opacity:.3;pointer-events:none;}

/* crop ratio chips */
.ratio-chips{display:flex;gap:6px;flex-wrap:wrap;}
.ratio-chip{
  padding:6px 12px;border-radius:var(--rs);font-size:12px;font-weight:600;
  border:0.5px solid var(--border2);background:var(--surface2);color:var(--muted);
  cursor:pointer;transition:all .15s;
}
.ratio-chip.on{background:var(--accent-d);border-color:var(--accent-b);color:var(--accent);}

/* sliders */
.sl-row{margin-bottom:14px;}
.sl-hdr{display:flex;justify-content:space-between;margin-bottom:6px;}
.sl-name{font-size:13px;color:var(--text);}
.sl-val{font-size:13px;color:var(--amber);font-weight:700;font-family:'SF Mono','Menlo',monospace;min-width:36px;text-align:right;}
input[type=range]{
  -webkit-appearance:none;appearance:none;width:100%;height:3px;
  border-radius:2px;background:var(--surface3);outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--amber);cursor:pointer;border:none;
}
input[type=range]::-moz-range-thumb{
  width:20px;height:20px;border-radius:50%;background:var(--amber);cursor:pointer;border:none;
}

/* flip toggles */
.flip-row{display:flex;gap:10px;}
.flip-btn{
  flex:1;padding:9px;border-radius:var(--rs);font-size:12px;font-weight:600;
  border:0.5px solid var(--border2);background:var(--surface2);color:var(--muted);
  cursor:pointer;text-align:center;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.flip-btn.on{background:var(--accent-d);border-color:var(--accent-b);color:var(--accent);}

/* scale row */
.scale-row{display:flex;gap:6px;flex-wrap:wrap;}
.scale-chip{
  padding:5px 10px;border-radius:var(--rs);font-size:11px;font-weight:700;
  border:0.5px solid var(--border2);background:var(--surface2);color:var(--muted);
  cursor:pointer;transition:all .15s;
}
.scale-chip.on{background:var(--amber-d);border-color:var(--amber-b);color:var(--amber);}

/* divider */
.divider{height:0.5px;background:var(--border);margin:14px 18px 0;}

/* toast */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--surface2);border:0.5px solid var(--border2);
  border-radius:22px;padding:9px 18px;font-size:13px;color:var(--text);
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:100;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--accent-b);color:var(--accent);}
.toast.err{border-color:var(--red-b);color:var(--red);}
.toast.warn{border-color:var(--amber-b);color:var(--amber);}

#hidden-canvas{display:none;}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">Snap<span>Name</span></div>
  <div class="hdr-right">
    <div class="status-dot" id="dot"></div>
    <button class="icon-btn" id="settings-btn" aria-label="Settings" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
  </div>
</div>

<!-- VIEWFINDER -->
<div class="vf-wrap" id="vf">
  <video id="video" autoplay playsinline muted></video>
  <img id="still-img" alt="Captured photo">

  <!-- Crop SVG overlay -->
  <svg id="crop-svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <mask id="crop-mask">
        <rect width="100%" height="100%" fill="white"/>
        <rect id="crop-hole" fill="black"/>
      </mask>
    </defs>
    <!-- dim outside crop -->
    <rect width="100%" height="100%" fill="rgba(0,0,0,0.45)" mask="url(#crop-mask)"/>
    <!-- crop border -->
    <rect id="crop-border" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
    <!-- rule of thirds lines -->
    <line id="th1" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
    <line id="th2" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
    <line id="tv1" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
    <line id="tv2" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
    <!-- corner handles -->
    <g id="handle-tl"><rect fill="white" rx="1.5"/></g>
    <g id="handle-tr"><rect fill="white" rx="1.5"/></g>
    <g id="handle-bl"><rect fill="white" rx="1.5"/></g>
    <g id="handle-br"><rect fill="white" rx="1.5"/></g>
    <!-- drag target (whole crop rect) -->
    <rect id="crop-drag" fill="transparent" cursor="move"/>
  </svg>

  <!-- Confirm/Reject bar (shown after capture) -->
  <div class="cr-bar" id="cr-bar">
    <div class="cr-filename" id="cr-filename">photo.jpg</div>
    <div class="cr-btns">
      <button class="cr-reject" id="cr-reject">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Retake
      </button>
      <button class="cr-confirm" id="cr-confirm">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Save
      </button>
    </div>
  </div>

  <!-- Capture button -->
  <div class="capture-wrap" id="cap-wrap">
    <button class="cap-btn disabled" id="cap-btn" aria-label="Capture photo">
      <div class="cap-inner"></div>
    </button>
  </div>

  <!-- QR overlay -->
  <div class="qr-overlay" id="qr-overlay">
    <div class="qr-frame"><div class="qr-line"></div></div>
    <div class="qr-hint">Aim at a barcode</div>
    <button class="qr-cancel" id="qr-cancel">Cancel</button>
  </div>

  <div class="flash" id="flash"></div>
</div>

<!-- BOTTOM PANEL -->
<div class="bottom">
  <div>
    <div class="lbl">File name</div>
    <div class="row">
      <input type="text" id="name-inp" class="name-inp" placeholder="e.g. receipt_jan" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="qr-btn" id="qr-btn" aria-label="Scan barcode for filename">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="2" height="2"/><rect x="18" y="14" width="2" height="2"/>
          <rect x="14" y="18" width="2" height="2"/><rect x="18" y="18" width="2" height="2"/>
        </svg>
      </button>
    </div>
  </div>
  <div>
    <div class="lbl">Format</div>
    <div class="chips" id="fmt-chips">
      <div class="chip on" data-fmt="jpg">JPG</div>
      <div class="chip" data-fmt="png">PNG</div>
      <div class="chip" data-fmt="webp">WEBP</div>
    </div>
  </div>
</div>

<!-- SETTINGS SHEET -->
<div class="sheet-backdrop" id="backdrop">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <span class="sheet-title">Settings</span>
      <button class="sheet-close" id="sheet-close" aria-label="Close settings">✕</button>
    </div>

    <!-- Quality -->
    <div class="sheet-section">
      <div class="sheet-section-lbl">Quality</div>
      <div class="q-chips" id="q-chips">
        <div class="q-chip" data-q="10">Min</div>
        <div class="q-chip" data-q="30">Low</div>
        <div class="q-chip on" data-q="60">Med</div>
        <div class="q-chip" data-q="82">High</div>
        <div class="q-chip" data-q="97">Max</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Resize -->
    <div class="sheet-section" style="margin-top:14px;">
      <div class="sheet-section-lbl">Resize scale</div>
      <div class="scale-row" id="scale-chips">
        <div class="scale-chip" data-sc="25">25%</div>
        <div class="scale-chip" data-sc="50">50%</div>
        <div class="scale-chip" data-sc="75">75%</div>
        <div class="scale-chip on" data-sc="100">100%</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Crop ratio -->
    <div class="sheet-section" style="margin-top:14px;">
      <div class="sheet-section-lbl">Crop ratio</div>
      <div class="ratio-chips" id="ratio-chips">
        <div class="ratio-chip on" data-ratio="free">Free</div>
        <div class="ratio-chip" data-ratio="1:1">1:1</div>
        <div class="ratio-chip" data-ratio="4:3">4:3</div>
        <div class="ratio-chip" data-ratio="16:9">16:9</div>
        <div class="ratio-chip" data-ratio="3:4">3:4</div>
        <div class="ratio-chip" data-ratio="9:16">9:16</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Edit: Brightness / Contrast / Saturation -->
    <div class="sheet-section" style="margin-top:14px;">
      <div class="sheet-section-lbl">Adjustments</div>
      <div class="sl-row">
        <div class="sl-hdr"><span class="sl-name">Brightness</span><span class="sl-val" id="br-val">0</span></div>
        <input type="range" id="br-sl" min="-100" max="100" step="1" value="0">
      </div>
      <div class="sl-row">
        <div class="sl-hdr"><span class="sl-name">Contrast</span><span class="sl-val" id="ct-val">0</span></div>
        <input type="range" id="ct-sl" min="-100" max="100" step="1" value="0">
      </div>
      <div class="sl-row">
        <div class="sl-hdr"><span class="sl-name">Saturation</span><span class="sl-val" id="sat-val">0</span></div>
        <input type="range" id="sat-sl" min="-100" max="100" step="1" value="0">
      </div>
      <div class="sl-row">
        <div class="sl-hdr"><span class="sl-name">Rotation</span><span class="sl-val" id="rot-val">0°</span></div>
        <input type="range" id="rot-sl" min="-180" max="180" step="1" value="0">
      </div>
    </div>

    <div class="divider"></div>

    <!-- Flip -->
    <div class="sheet-section" style="margin-top:14px;">
      <div class="sheet-section-lbl">Flip</div>
      <div class="flip-row">
        <button class="flip-btn" id="flip-h">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 3v18M3 9l4-3 4 3M17 9l4-3-4-3"/></svg>
          Horizontal
        </button>
        <button class="flip-btn" id="flip-v">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 12h18M9 3l-3 4 3 4M9 17l-3 4 3 4"/></svg>
          Vertical
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Reset -->
    <div class="sheet-section" style="margin-top:14px;">
      <button id="reset-btn" style="width:100%;padding:10px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--rs);color:var(--muted);font-size:13px;cursor:pointer;">
        Reset all adjustments
      </button>
    </div>

  </div>
</div>

<canvas id="hidden-canvas"></canvas>
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ── ELEMENTS ──
const video   = document.getElementById('video');
const stillImg= document.getElementById('still-img');
const capBtn  = document.getElementById('cap-btn');
const capWrap = document.getElementById('cap-wrap');
const crBar   = document.getElementById('cr-bar');
const crFilename=document.getElementById('cr-filename');
const crConfirm=document.getElementById('cr-confirm');
const crReject =document.getElementById('cr-reject');
const nameInp  =document.getElementById('name-inp');
const qrBtn    =document.getElementById('qr-btn');
const qrOverlay=document.getElementById('qr-overlay');
const qrCancel =document.getElementById('qr-cancel');
const dot      =document.getElementById('dot');
const flashEl  =document.getElementById('flash');
const toastEl  =document.getElementById('toast');
const canvas   =document.getElementById('hidden-canvas');
const settingsBtn=document.getElementById('settings-btn');
const backdrop =document.getElementById('backdrop');
const sheet    =document.getElementById('sheet');
const sheetClose=document.getElementById('sheet-close');
const resetBtn =document.getElementById('reset-btn');
const flipH    =document.getElementById('flip-h');
const flipV    =document.getElementById('flip-v');

// ── STATE ──
let stream=null, rawDataUrl=null;
let scanning=false, qrAnim=null;
let fmt='jpg';
let quality=60, scale=100, cropRatio='free';
let brightness=0, contrast=0, saturation=0, rotation=0;
let doFlipH=false, doFlipV=false;

// Crop box state (0–1 relative to video display size)
let crop={x:0.05,y:0.05,w:0.9,h:0.9};
let dragState=null; // {type:'move'|'br', sx,sy,ox,oy,ow,oh}

// ── TOAST ──
function toast(msg,type=''){
  toastEl.textContent=msg;
  toastEl.className='toast show '+(type||'');
  clearTimeout(toastEl._t);
  toastEl._t=setTimeout(()=>{toastEl.className='toast';},2800);
}

// ── CAMERA ──
async function startCam(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:3840},height:{ideal:2160}},
      audio:false
    });
    video.srcObject=stream;
    await video.play();
    dot.classList.add('live');
    capBtn.classList.remove('disabled');
    updateCropSvg();
  }catch(e){
    dot.classList.remove('live');
    toast('Camera denied — allow in browser settings','err');
  }
}

// ── CROP SVG ──
const cropSvg   =document.getElementById('crop-svg');
const cropHole  =document.getElementById('crop-hole');
const cropBorder=document.getElementById('crop-border');
const cropDrag  =document.getElementById('crop-drag');
const handles   ={tl:document.getElementById('handle-tl'),tr:document.getElementById('handle-tr'),bl:document.getElementById('handle-bl'),br:document.getElementById('handle-br')};
const thirds    ={h1:document.getElementById('th1'),h2:document.getElementById('th2'),v1:document.getElementById('tv1'),v2:document.getElementById('tv2')};

function vfSize(){
  const r=document.getElementById('vf').getBoundingClientRect();
  return{w:r.width,h:r.height};
}

function updateCropSvg(){
  const{w,h}=vfSize();
  const x=crop.x*w, y=crop.y*h, cw=crop.w*w, ch=crop.h*h;
  const hs=10; // handle size

  function setRect(el,rx,ry,rw,rh){
    el.setAttribute('x',rx);el.setAttribute('y',ry);
    el.setAttribute('width',rw);el.setAttribute('height',rh);
  }
  setRect(cropHole,x,y,cw,ch);
  setRect(cropBorder,x,y,cw,ch);
  setRect(cropDrag,x,y,cw,ch);

  // thirds
  thirds.h1.setAttribute('x1',x);thirds.h1.setAttribute('y1',y+ch/3);thirds.h1.setAttribute('x2',x+cw);thirds.h1.setAttribute('y2',y+ch/3);
  thirds.h2.setAttribute('x1',x);thirds.h2.setAttribute('y1',y+ch*2/3);thirds.h2.setAttribute('x2',x+cw);thirds.h2.setAttribute('y2',y+ch*2/3);
  thirds.v1.setAttribute('x1',x+cw/3);thirds.v1.setAttribute('y1',y);thirds.v1.setAttribute('x2',x+cw/3);thirds.v1.setAttribute('y2',y+ch);
  thirds.v2.setAttribute('x1',x+cw*2/3);thirds.v2.setAttribute('y1',y);thirds.v2.setAttribute('x2',x+cw*2/3);thirds.v2.setAttribute('y2',y+ch);

  // corner handle rects
  const hd=hs/2;
  function setH(g,hx,hy){const r=g.querySelector('rect');r.setAttribute('x',hx-hd);r.setAttribute('y',hy-hd);r.setAttribute('width',hs);r.setAttribute('height',hs);}
  setH(handles.tl,x,y);
  setH(handles.tr,x+cw,y);
  setH(handles.bl,x,y+ch);
  setH(handles.br,x+cw,y+ch);
}

window.addEventListener('resize',updateCropSvg);

// Constrain crop to [0,1] bounds and min size
function clampCrop(){
  const minS=0.08;
  crop.w=Math.max(minS,Math.min(1-crop.x,crop.w));
  crop.h=Math.max(minS,Math.min(1-crop.y,crop.h));
  crop.x=Math.max(0,Math.min(1-crop.w,crop.x));
  crop.y=Math.max(0,Math.min(1-crop.h,crop.y));
}

function applyRatio(ratio){
  if(ratio==='free')return;
  const[rw,rh]=ratio.split(':').map(Number);
  const{w,h}=vfSize();
  const vfAspect=w/h;
  const cropAspect=rw/rh;
  // keep center, adjust dims
  const cx=crop.x+crop.w/2, cy=crop.y+crop.h/2;
  let nw=crop.w, nh=crop.h;
  if(cropAspect>vfAspect){
    nw=crop.w;
    nh=nw*(rh/rw)*(w/h);
  } else {
    nh=crop.h;
    nw=nh*(rw/rh)*(h/w);
  }
  crop.w=Math.min(0.96,nw);
  crop.h=Math.min(0.96,nh);
  crop.x=cx-crop.w/2;
  crop.y=cy-crop.h/2;
  clampCrop();
  updateCropSvg();
}

// Pointer events for crop dragging
function ptCoords(e){
  const r=document.getElementById('vf').getBoundingClientRect();
  const pt=e.touches?e.touches[0]:e;
  return{x:(pt.clientX-r.left)/r.width,y:(pt.clientY-r.top)/r.height};
}

// Enable interactive crop on svg when in review mode
function enableCropDrag(){
  cropSvg.classList.add('interactive');

  function onDown(type,e){
    e.preventDefault();e.stopPropagation();
    const p=ptCoords(e);
    dragState={type,sx:p.x,sy:p.y,ox:crop.x,oy:crop.y,ow:crop.w,oh:crop.h};
  }

  cropDrag.addEventListener('pointerdown',e=>onDown('move',e));
  handles.br.querySelector('rect').addEventListener('pointerdown',e=>onDown('br',e));
  handles.tr.querySelector('rect').addEventListener('pointerdown',e=>onDown('tr',e));
  handles.bl.querySelector('rect').addEventListener('pointerdown',e=>onDown('bl',e));
  handles.tl.querySelector('rect').addEventListener('pointerdown',e=>onDown('tl',e));

  cropSvg.addEventListener('pointermove',e=>{
    if(!dragState)return;
    e.preventDefault();
    const p=ptCoords(e);
    const dx=p.x-dragState.sx, dy=p.y-dragState.sy;
    const t=dragState.type;
    if(t==='move'){crop.x=dragState.ox+dx;crop.y=dragState.oy+dy;}
    else if(t==='br'){crop.w=dragState.ow+dx;crop.h=dragState.oh+dy;}
    else if(t==='tr'){crop.w=dragState.ow+dx;crop.y=dragState.oy+dy;crop.h=dragState.oh-dy;}
    else if(t==='bl'){crop.x=dragState.ox+dx;crop.w=dragState.ow-dx;crop.h=dragState.oh+dy;}
    else if(t==='tl'){crop.x=dragState.ox+dx;crop.y=dragState.oy+dy;crop.w=dragState.ow-dx;crop.h=dragState.oh-dy;}
    if(cropRatio!=='free')applyRatioFromCenter();
    clampCrop();
    updateCropSvg();
  });

  cropSvg.addEventListener('pointerup',()=>{dragState=null;});
  cropSvg.addEventListener('pointercancel',()=>{dragState=null;});
}

function applyRatioFromCenter(){
  if(cropRatio==='free')return;
  const[rw,rh]=cropRatio.split(':').map(Number);
  const{w,h}=vfSize();
  const cx=crop.x+crop.w/2, cy=crop.y+crop.h/2;
  const nw=crop.w;
  const nh=nw*(rh/rw)*(w/h);
  crop.h=nh;
  crop.y=cy-crop.h/2;
}

// ── CAPTURE ──
capBtn.addEventListener('click',()=>{
  if(!stream)return;
  const vw=video.videoWidth, vh=video.videoHeight;
  canvas.width=vw; canvas.height=vh;
  canvas.getContext('2d').drawImage(video,0,0,vw,vh);
  rawDataUrl=canvas.toDataURL('image/png');

  flashEl.classList.add('go');
  setTimeout(()=>flashEl.classList.remove('go'),120);

  // Show still in viewfinder
  stillImg.src=rawDataUrl;
  stillImg.style.display='block';
  video.style.opacity='0';
  capWrap.classList.add('hidden');
  crFilename.textContent=getFilename();
  crBar.classList.add('visible');
  enableCropDrag();
});

// ── CONFIRM / REJECT ──
crConfirm.addEventListener('click',async()=>{
  if(!rawDataUrl)return;
  try{
    await saveImage();
    // success — clear field, restore camera
    nameInp.value='';
    nameInp.classList.remove('filled');
    resetReview();
  }catch(e){
    toast('Save failed: '+e.message,'err');
  }
});

crReject.addEventListener('click',()=>{
  // keep name, discard photo
  resetReview();
  toast('Retaking — name kept','warn');
});

function resetReview(){
  stillImg.style.display='none';
  video.style.opacity='1';
  capWrap.classList.remove('hidden');
  crBar.classList.remove('visible');
  rawDataUrl=null;
  cropSvg.classList.remove('interactive');
}

// ── SAVE IMAGE ──
async function saveImage(){
  const fname=getFilename();
  const mimeMap={jpg:'image/jpeg',png:'image/png',webp:'image/webp'};
  const mime=mimeMap[fmt]||'image/jpeg';
  const q=(fmt==='png')?undefined:(quality/100);
  const sc=scale/100;

  // Build processed canvas
  const src=new Image();
  await new Promise(res=>{src.onload=res;src.src=rawDataUrl;});

  const{w:vfw,h:vfh}=vfSize();
  // Map crop (relative to display) back to full image pixels
  const scaleX=src.naturalWidth/vfw;
  const scaleY=src.naturalHeight/vfh;
  const cropX=Math.round(crop.x*vfw*scaleX);
  const cropY=Math.round(crop.y*vfh*scaleY);
  const cropW=Math.round(crop.w*vfw*scaleX);
  const cropH=Math.round(crop.h*vfh*scaleY);

  const outW=Math.round(cropW*sc);
  const outH=Math.round(cropH*sc);
  canvas.width=outW; canvas.height=outH;
  const ctx=canvas.getContext('2d');

  // Build CSS filter string
  const br=1+(brightness/100);
  const ct=1+(contrast/100);
  const sat=1+(saturation/100);
  ctx.filter=`brightness(${br.toFixed(2)}) contrast(${ct.toFixed(2)}) saturate(${sat.toFixed(2)})`;

  ctx.save();
  ctx.translate(outW/2,outH/2);
  if(doFlipH)ctx.scale(-1,1);
  if(doFlipV)ctx.scale(1,-1);
  ctx.rotate(rotation*Math.PI/180);
  ctx.drawImage(src,cropX,cropY,cropW,cropH,-outW/2,-outH/2,outW,outH);
  ctx.restore();

  const dataUrl=canvas.toDataURL(mime,q);
  const blob=await (await fetch(dataUrl)).blob();

  // Try File System Access API (Chrome/Edge)
  if(window.showSaveFilePicker){
    const extMap={jpg:'jpeg',png:'png',webp:'webp'};
    const handle=await window.showSaveFilePicker({
      suggestedName:fname,
      types:[{description:'Image',accept:{[mime]:['.'+(fmt==='jpg'?'jpg':fmt)]}}]
    });
    const writable=await handle.createWritable();
    await writable.write(blob);
    await writable.close();
    const kb=(blob.size/1024).toFixed(0);
    toast('Saved '+fname+' ('+kb+' KB)','ok');
  } else {
    // Fallback download
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=fname;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    const kb=(blob.size/1024).toFixed(0);
    toast('Downloaded '+fname+' ('+kb+' KB)','ok');
  }
}

function getFilename(){
  const raw=nameInp.value.trim();
  const base=raw.length>0?raw.replace(/[^a-zA-Z0-9_\-. ]/g,'_').replace(/\s+/g,'_'):'photo_'+Date.now();
  return base+'.'+fmt;
}

// ── FORMAT CHIPS ──
document.querySelectorAll('#fmt-chips .chip').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('#fmt-chips .chip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on'); fmt=c.dataset.fmt;
    const isPng=fmt==='png';
    document.querySelectorAll('#q-chips .q-chip').forEach(q=>q.classList.toggle('disabled',isPng));
    crFilename.textContent=getFilename();
  });
});

// ── NAME INPUT ──
nameInp.addEventListener('input',()=>{
  nameInp.classList.toggle('filled',nameInp.value.trim().length>0);
  crFilename.textContent=getFilename();
});

// ── QR SCAN ──
qrBtn.addEventListener('click',()=>{
  if(scanning){stopQr();return;}
  if(!stream){toast('Camera not ready','err');return;}
  startQr();
});
qrCancel.addEventListener('click',stopQr);

function startQr(){
  scanning=true; qrBtn.classList.add('on'); qrOverlay.classList.add('visible');
  scanFrame();
}
function stopQr(){
  scanning=false; qrBtn.classList.remove('on'); qrOverlay.classList.remove('visible');
  if(qrAnim){cancelAnimationFrame(qrAnim);qrAnim=null;}
}
let barcodeDetector = null;
if (window.BarcodeDetector) {
  barcodeDetector = new BarcodeDetector();
}

async function scanFrame(){
  if(!scanning)return;
  if(video.readyState===video.HAVE_ENOUGH_DATA){
    try{
      if (!barcodeDetector) {
        toast('Barcode reading not supported in this browser', 'err');
        stopQr();
        return;
      }
      const barcodes = await barcodeDetector.detect(video);
      if(barcodes && barcodes.length > 0){
        const val=barcodes[0].rawValue.trim().replace(/[^a-zA-Z0-9_\-. ]/g,'_');
        nameInp.value=val; nameInp.classList.add('filled');
        stopQr(); toast('Name from barcode: '+val,'ok'); nameInp.focus(); return;
      }
    }catch(e){}
  }
  qrAnim=requestAnimationFrame(scanFrame);
}

// ── SETTINGS SHEET ──
settingsBtn.addEventListener('click',()=>{backdrop.classList.add('open');sheet.classList.add('open');});
function closeSheet(){backdrop.classList.remove('open');sheet.classList.remove('open');}
sheetClose.addEventListener('click',closeSheet);
backdrop.addEventListener('click',e=>{if(e.target===backdrop)closeSheet();});

// Quality chips
document.querySelectorAll('#q-chips .q-chip').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('#q-chips .q-chip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on'); quality=parseInt(c.dataset.q);
  });
});

// Scale chips
document.querySelectorAll('#scale-chips .scale-chip').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('#scale-chips .scale-chip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on'); scale=parseInt(c.dataset.sc);
  });
});

// Ratio chips
document.querySelectorAll('#ratio-chips .ratio-chip').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('#ratio-chips .ratio-chip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on'); cropRatio=c.dataset.ratio;
    applyRatio(cropRatio); updateCropSvg();
  });
});

// Adjustment sliders
function wireSlider(id,valId,setter,suffix){
  const sl=document.getElementById(id),vl=document.getElementById(valId);
  sl.addEventListener('input',()=>{
    const v=parseInt(sl.value);
    vl.textContent=v+(suffix||'');
    setter(v);
  });
}
wireSlider('br-sl','br-val',v=>{brightness=v;});
wireSlider('ct-sl','ct-val',v=>{contrast=v;});
wireSlider('sat-sl','sat-val',v=>{saturation=v;});
wireSlider('rot-sl','rot-val',v=>{rotation=v;},'°');

// Flip
flipH.addEventListener('click',()=>{doFlipH=!doFlipH;flipH.classList.toggle('on',doFlipH);});
flipV.addEventListener('click',()=>{doFlipV=!doFlipV;flipV.classList.toggle('on',doFlipV);});

// Reset
resetBtn.addEventListener('click',()=>{
  brightness=0;contrast=0;saturation=0;rotation=0;doFlipH=false;doFlipV=false;
  ['br-sl','ct-sl','sat-sl','rot-sl'].forEach(id=>{document.getElementById(id).value=0;});
  document.getElementById('br-val').textContent='0';
  document.getElementById('ct-val').textContent='0';
  document.getElementById('sat-val').textContent='0';
  document.getElementById('rot-val').textContent='0°';
  flipH.classList.remove('on');flipV.classList.remove('on');
  crop={x:0.05,y:0.05,w:0.9,h:0.9};
  cropRatio='free';
  document.querySelectorAll('#ratio-chips .ratio-chip').forEach(c=>c.classList.toggle('on',c.dataset.ratio==='free'));
  updateCropSvg();
  toast('Reset done','ok');
});

// ── BOOT ──
startCam();
})();
</script>
</body>
</html>
